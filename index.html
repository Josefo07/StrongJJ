// ============================================================
// HELPERS DE STORAGE
// ============================================================
const STORAGE_KEY = 'jjStrong_v1';

var defaultState = {
  fase: 'fase1',
  fechaInicio: new Date().toISOString().slice(0, 10),
  sesiones: [],
  mediciones: [],
  suplementosLog: {},
  ultimoExport: null,
};

function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState;
    var parsed = JSON.parse(raw);
    return Object.assign({}, defaultState, parsed);
  } catch (e) {
    return defaultState;
  }
}

function saveState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.error('Save failed', e);
  }
}

var DIAS_SEMANA = ['domingo', 'lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado'];
var DIAS_DISPLAY = {
  domingo: 'Domingo',
  lunes: 'Lunes',
  martes: 'Martes',
  miercoles: 'Miercoles',
  jueves: 'Jueves',
  viernes: 'Viernes',

};

function getTodayKey() {
  return DIAS_SEMANA[new Date().getDay()];
}

function todayISO() {
  return new Date().toISOString().slice(0, 10);
}

function formatDate(iso) {
  var d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('es-MX', { weekday: 'short', day: 'numeric', month: 'short' });
}

// ============================================================
// PROGRESION AUTOMATICA
// ============================================================
function suggestNextWeight(exerciseId, sesiones) {
  var relevantes = sesiones
    .filter(function(s) { return s.ejercicios && s.ejercicios.some(function(e) { return e.id === exerciseId; }); })
    .slice(-3);

  if (relevantes.length === 0) return null;

  var ultima = relevantes[relevantes.length - 1];
  var ej = ultima.ejercicios.find(function(e) { return e.id === exerciseId; });
  if (!ej || !ej.series || ej.series.length === 0) return null;

  var ultimoPeso = ej.series[0].peso || 0;
  var repsObjetivo = ej.repsObjetivo || ej.series[0].reps || 0;

  if (relevantes.length >= 2) {
    var completoTodo = relevantes.slice(-2).every(function(s) {
      var e = s.ejercicios.find(function(x) { return x.id === exerciseId; });
      if (!e || !e.series) return false;
      return e.series.every(function(serie) { return serie.reps >= (e.repsObjetivo || repsObjetivo); });
    });

    if (completoTodo) {
      return {
        peso: Math.round((ultimoPeso + 1.5) * 2) / 2,
        razon: 'Completaste todas las reps en las ultimas 2 sesiones. Subele.',
      };
    }
  }

  return { peso: ultimoPeso, razon: 'Manten peso. Apunta a completar todas las reps.' };
}

function Toast(props) {

  var onClose = props.onClose;

  useEffect(function() {
    var t = setTimeout(onClose, 2500);
    return function() { clearTimeout(t); };
  }, [onClose]);

  var colors = {
    info: 'bg-neutral-800 border-neutral-700',
    success: 'bg-green-900/80 border-green-700',
    warn: 'bg-yellow-900/80 border-yellow-700',
    danger: 'bg-red-900/80 border-red-700',
  };

  return h('div', {className: 'fixed top-4 left-4 right-4 z-50 px-4 py-3 rounded-xl border ' + colors[type] + ' backdrop-blur text-white text-sm shadow-2xl screen-enter'},
    message
  );
}

// ============================================================
// COMPONENTE: Timer de Descanso
// ============================================================
function RestTimer(props) {
  var seconds = props.seconds, onComplete = props.onComplete, onCancel = props.onCancel;
  var _remaining = useState(seconds);
  var remaining = _remaining[0], setRemaining = _remaining[1];
  var _paused = useState(false);
  var paused = _paused[0], setPaused = _paused[1];

  useEffect(function() {
    if (paused) return;
    if (remaining <= 0) {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 800;
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
        osc.start();
        osc.stop(ctx.currentTime + 0.5);
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      } catch (e) {}
      onComplete();
      return;
    }
    var t = setTimeout(function() { setRemaining(function(r) { return r - 1; }); }, 1000);
    return function() { clearTimeout(t); };
  }, [remaining, paused, onComplete]);

  var mins = Math.floor(remaining / 60);
  var secs = remaining % 60;

  return h('div', {className: 'fixed inset-0 z-50 flex items-center justify-center bg-black/95 backdrop-blur-md'},
    h('div', {className: 'text-center w-full px-6'},
      h('div', {className: 'text-xs font-mono text-neutral-500 mb-4 uppercase tracking-widest'}, 'Descanso'),
      h('div', {className: 'font-display text-9xl text-orange-500 timer-active rounded-full inline-flex items-center justify-center w-72 h-72 border-4 border-orange-500/30'},
        String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0')
      ),
      h('div', {className: 'mt-12 flex gap-3 justify-center'},
        h('button', {onClick: function() { setRemaining(function(r) { return Math.max(0, r - 15); }); }, className: 'px-5 py-3 bg-neutral-800 rounded-xl text-sm font-semibold'}, '-15s'),
        h('button', {onClick: function() { setPaused(function(p) { return !p; }); }, className: 'px-5 py-3 bg-neutral-800 rounded-xl text-sm font-semibold'},
          paused ? 'Reanudar' : 'Pausa'
        ),
        h('button', {onClick: function() { setRemaining(function(r) { return r + 15; }); }, className: 'px-5 py-3 bg-neutral-800 rounded-xl text-sm font-semibold'}, '+15s')
      ),
      h('button', {onClick: onCancel, className: 'mt-6 text-neutral-500 text-sm'}, 'Saltar descanso')
    )
  );
}

// ============================================================
// COMPONENTE: Timer de Tempo (3-3-3)
// ============================================================
function TempoTimer(props) {
  var tempo = props.tempo, reps = props.reps, onClose = props.onClose;
  var _running = useState(false);
  var running = _running[0], setRunning = _running[1];
  var _phase = useState('listo');
  var phase = _phase[0], setPhase = _phase[1];
  var _currentRep = useState(0);
  var currentRep = _currentRep[0], setCurrentRep = _currentRep[1];
  var _phaseTime = useState(0);
  var phaseTime = _phaseTime[0], setPhaseTime = _phaseTime[1];

  useEffect(function() {
    if (!running) return;
    var interval = setInterval(function() {
      setPhaseTime(function(pt) { return pt + 0.1; });
    }, 100);
    return function() { clearInterval(interval); };
  }, [running]);

  useEffect(function() {
    if (!running) return;
    var tInPhase = phaseTime;

    if (phase === 'eccentric' && tInPhase >= tempo.eccentric) {
      setPhase('pause');
      setPhaseTime(0);
      try { if (navigator.vibrate) navigator.vibrate(50); } catch(e){}
    } else if (phase === 'pause' && tInPhase >= tempo.pause) {
      setPhase('concentric');
      setPhaseTime(0);
      try { if (navigator.vibrate) navigator.vibrate(50); } catch(e){}
    } else if (phase === 'concentric' && tInPhase >= tempo.concentric) {
      var next = currentRep + 1;
      if (next >= reps) {
        setRunning(false);
        setPhase('done');
        try { if (navigator.vibrate) navigator.vibrate([200, 100, 200]); } catch(e){}
      } else {
        setCurrentRep(next);
        setPhase('eccentric');
        setPhaseTime(0);
      }
    }
  }, [phaseTime, phase, currentRep, running, reps, tempo]);

  var start = function() {
    setRunning(true);
    setPhase('eccentric');
    setCurrentRep(0);
    setPhaseTime(0);
  };

  var phaseLabels = {
    listo: 'Listo',
    eccentric: 'BAJA',
    pause: 'PAUSA',
    concentric: 'SUBE',
    done: 'Listo!',
  };

  var phaseColors = {
    listo: 'text-neutral-400',
    eccentric: 'text-blue-400',
    pause: 'text-yellow-400',
    concentric: 'text-orange-500',
    done: 'text-green-400',
  };

  var targetTime = phase === 'eccentric' ? tempo.eccentric :
                   phase === 'pause' ? tempo.pause :
                   phase === 'concentric' ? tempo.concentric : 0;

  return h('div', {className: 'fixed inset-0 z-50 flex items-center justify-center bg-black/95 backdrop-blur-md'},
    h('div', {className: 'text-center w-full px-6'},
      h('div', {className: 'text-xs font-mono text-neutral-500 mb-2 uppercase tracking-widest'},
        'Rep ' + (currentRep + 1) + ' / ' + reps
      ),
      h('div', {className: 'font-display text-8xl mb-2 ' + phaseColors[phase]},
        phaseLabels[phase]
      ),
      h('div', {className: 'font-mono text-2xl text-neutral-400 mb-8'},
        targetTime > 0 ? (targetTime - phaseTime).toFixed(1) + 's' : '·'
      ),
      h('div', {className: 'font-mono text-xs text-neutral-600 mb-8'},
        'Tempo: ' + tempo.eccentric + '-' + tempo.pause + '-' + tempo.concentric
      ),
      !running && phase !== 'done' && h('button', {onClick: start, className: 'px-8 py-4 bg-orange-600 rounded-2xl font-bold text-white'},
        'Iniciar Rep'
      ),
      phase === 'done' && h('button', {onClick: function() { setPhase('listo'); setCurrentRep(0); }, className: 'px-8 py-4 bg-green-600 rounded-2xl font-bold text-white'},
        'Otra serie'
      ),
      h('button', {onClick: onClose, className: 'block mx-auto mt-8 text-neutral-500 text-sm'}, 'Cerrar')
    )
  );
}

function ExerciseScreen(props) {
  var exerciseConfig = props.exerciseConfig, onComplete = props.onComplete, onSkip = props.onSkip, onShowToast = props.onShowToast, sesiones = props.sesiones;
  var ex = EXERCISES[exerciseConfig.id];
  var series = exerciseConfig.series || ex.series_default || 3;
  var repsObj = exerciseConfig.reps || ex.reps_default;
  var duracionObj = exerciseConfig.duracion || ex.duracion_default;
  var isWarmup = exerciseConfig.warmup;

  var sugerencia = useMemo(function() {
    return isWarmup ? null : suggestNextWeight(ex.id, sesiones);
  }, [ex.id, sesiones, isWarmup]);

  var _registros = useState(function() {
    return Array.from({ length: series }, function() {
      return {
        peso: sugerencia ? sugerencia.peso : 0,
        reps: repsObj || 0,
        duracion: duracionObj || 0,
        done: false,
      };
    });
  });
  var registros = _registros[0], setRegistros = _registros[1];
  var _showInstructions = useState(false);
  var showInstructions = _showInstructions[0], setShowInstructions = _showInstructions[1];
  var _showRest = useState(false);
  var showRest = _showRest[0], setShowRest = _showRest[1];
  var _showTempo = useState(false);
  var showTempo = _showTempo[0], setShowTempo = _showTempo[1];
  var _serieActiva = useState(0);
  var serieActiva = _serieActiva[0], setSerieActiva = _serieActiva[1];

  var totalSeries = ex.unilateral ? series * 2 : series;

  var completarSerie = function(idx) {
    var newReg = registros.slice();
    newReg[idx] = Object.assign({}, newReg[idx], { done: true });
    setRegistros(newReg);

    if (idx < registros.length - 1) {
      setSerieActiva(idx + 1);
      if (ex.descanso > 0) setShowRest(true);
    } else {
      onComplete({
        id: ex.id,
        nombre: ex.nombre,
        repsObjetivo: repsObj,
        series: newReg.map(function(r) {
          return {
            peso: Number(r.peso) || 0,
            reps: Number(r.reps) || 0,
            duracion: Number(r.duracion) || 0,
          };
        }),
      });
    }
  };

    var newReg = registros.slice();
    var update = {};
    update[field] = value;
    newReg[idx] = Object.assign({}, newReg[idx], update);
    setRegistros(newReg);
  };

          isWarmup && h('div', {className: 'text-[10px] font-mono text-blue-400 uppercase tracking-widest mb-1'}, 'Calentamiento'),
          h('h2', {className: 'font-display text-3xl leading-none'}, ex.nombre)

        ex.tempo && h('span', null, '| tempo ' + ex.tempo.eccentric + '-' + ex.tempo.pause + '-' + ex.tempo.concentric)

        h('div', {className: 'text-[10px] font-mono text-orange-400 uppercase tracking-widest mb-1'}, 'Por que'),

        h('ol', {className: 'space-y-2'},

            return h('li', {key: i, className: 'flex gap-3 text-sm'},

                  h(Line, {type: 'monotone', dataKey: 'peso', stroke: '#ff6b1a', strokeWidth: 3, name: 'Peso (kg)'})
                )
              )
            )
          )

          )
        : h('div', {className: 'mt-5 h-56 bg-neutral-900/50 border border-neutral-800 rounded-2xl p-3'},

                h(YAxis, {stroke: '#666', fontSize: 10}),
                h(Tooltip, {contentStyle: { background: '#0a0a0a', border: '1px solid #333' }}),
                h(Line, {type: 'monotone', dataKey: 'peso', stroke: '#4ade80', strokeWidth: 2, name: 'Peso kg'}),
                h(Line, {type: 'monotone', dataKey: 'cintura', stroke: '#fbbf24', strokeWidth: 2, name: 'Cintura cm'}),
                h(Line, {type: 'monotone', dataKey: 'pecho', stroke: '#60a5fa', strokeWidth: 2, name: 'Pecho cm'})
              )
            )

        h('h3', {className: 'font-display text-3xl mb-4'}, 'Nueva medicion'),

          { k: 'cintura', label: 'Cintura (cm)', step: 0.5 },
          { k: 'pecho', label: 'Pecho (cm)', step: 0.5 },

            h('label', {className: 'text-[10px] font-mono text-neutral-500 uppercase tracking-widest'}, f.label),
            h('input', {
              type: 'number',
              step: f.step,
              value: nuevaMedicion[f.k],
              onChange: function(e) { setNuevaMedicion(Object.assign({}, nuevaMedicion, (function() { var o = {}; o[f.k] = e.target.value; return o; })())); },
              className: 'w-full mt-2 px-4 py-3 bg-neutral-900 border border-neutral-800 rounded-xl font-mono text-2xl'
            })

        h('button', {onClick: guardarMedicion, className: 'w-full py-4 bg-orange-600 rounded-xl font-display text-2xl mt-4'},

}

// ============================================================
// PANTALLA: SUPLEMENTOS
// ============================================================
function SupplementsScreen(props) {
  var state = props.state, setState = props.setState, onShowToast = props.onShowToast;
  var today = todayISO();
  var todayLog = state.suplementosLog[today] || {};

  var toggleSup = function(supId) {
    var newLog = Object.assign({}, state.suplementosLog);
    if (!newLog[today]) newLog[today] = {};
    newLog[today][supId] = !newLog[today][supId];
    setState(function(s) { return Object.assign({}, s, { suplementosLog: newLog }); });
  };

  var streak = useMemo(function() {
    var count = 0;
    var d = new Date();
    while (true) {
      var key = d.toISOString().slice(0, 10);
      var log = state.suplementosLog[key];
      if (log && log.whey && log.creatina) {
        count++;
        d.setDate(d.getDate() - 1);
      } else break;
    }
    return count;
  }, [state.suplementosLog]);

  return h('div', {className: 'px-5 pt-6 pb-28 screen-enter'},
    h('h1', {className: 'font-display text-4xl'}, 'Suplementos'),
    h('p', {className: 'text-xs font-mono text-neutral-500 mt-1'}, formatDate(today)),

    streak > 0 && h('div', {className: 'mt-4 inline-flex items-center gap-2 px-3 py-1.5 bg-orange-900/30 border border-orange-900/50 rounded-full'},
      h('span', {className: 'text-orange-500'}, '~'),
      h('span', {className: 'text-xs font-mono'}, 'Racha: ' + streak + ' ' + (streak === 1 ? 'dia' : 'dias'))
    ),

    h('div', {className: 'mt-6 space-y-3'},
      SUPLEMENTOS.map(function(sup) {
        var tomado = todayLog[sup.id];
        return h('button', {
          key: sup.id,
          onClick: function() { toggleSup(sup.id); },
          className: 'w-full p-4 rounded-2xl border text-left transition ' + (
            tomado ? 'bg-green-950/30 border-green-900/50' : 'bg-neutral-900/50 border-neutral-800'
          )
        },
          h('div', {className: 'flex items-start gap-3'},
            h('div', {className: 'w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 ' + (
              tomado ? 'bg-green-600' : 'border-2 border-neutral-700'
            )},
              tomado && h('span', {className: 'text-white text-lg'}, '✓')
            ),
            h('div', {className: 'flex-1'},
              h('div', {className: 'flex items-center gap-2'},
                h('div', {className: 'font-display text-xl'}, sup.nombre),
                sup.prioridad === 1 && h('span', {className: 'text-[9px] font-mono text-orange-500 px-1.5 py-0.5 border border-orange-700/50 rounded'}, 'CORE')
              ),
              h('div', {className: 'text-xs text-neutral-400 mt-1 font-mono'}, sup.dosis),
              h('div', {className: 'text-[10px] text-neutral-500 mt-0.5'}, sup.momento)
            )
          )
        );
      })
    ),

    h('div', {className: 'mt-8 p-4 bg-neutral-900/30 border border-neutral-800 rounded-2xl'},
      h('div', {className: 'text-[10px] font-mono text-neutral-500 uppercase tracking-widest mb-2'}, 'Recordatorio'),
      h('p', {className: 'text-xs text-neutral-400'},
        'Antes de empezar creatina y omega 3, valida con tu medico con quimica sanguinea basica (funcion renal, perfil lipidico, vitamina D). A los 50 anos deberias tener este chequeo anual.'
      )
    )
  );
}

// ============================================================
// PANTALLA: CONFIGURACION / EXPORT
// ============================================================
function SettingsScreen(props) {
  var state = props.state, setState = props.setState, onShowToast = props.onShowToast;
  var fileInputRef = useRef(null);

  var exportar = function() {
    var blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'jjstrong-backup-' + todayISO() + '.json';
    a.click();
    URL.revokeObjectURL(url);
    setState(function(s) { return Object.assign({}, s, { ultimoExport: todayISO() }); });
    onShowToast('Backup descargado. Subelo a OneDrive.', 'success');
  };

  var exportarCSV = function() {
    var csv = 'Fecha,Tipo,Ejercicio,Serie,Peso(kg),Reps,Duracion(s),DolorPre,DolorPost,Notas\n';
    state.sesiones.forEach(function(s) {
      if (s.ejercicios) {
        s.ejercicios.forEach(function(e) {
          e.series.forEach(function(ser, si) {
            csv += s.fecha + ',"' + s.tipo + '","' + e.nombre + '",' + (si+1) + ',' + (ser.peso || 0) + ',' + (ser.reps || 0) + ',' + (ser.duracion || 0) + ',' + (s.dolorPre || '') + ',' + (s.dolorPost || '') + ',"' + (s.notas || '').replace(/"/g, '""') + '"\n';
          });
        });
      }
    });
    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'jjstrong-sesiones-' + todayISO() + '.csv';
    a.click();
    URL.revokeObjectURL(url);
    onShowToast('CSV descargado.', 'success');
  };

  var importar = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(event) {
      try {
        var data = JSON.parse(event.target.result);
        if (!confirm('Esto reemplazara todos tus datos actuales. Continuar?')) return;
        setState(Object.assign({}, defaultState, data));
        onShowToast('Datos importados', 'success');
      } catch (err) {
        onShowToast('Archivo invalido', 'danger');
      }
    };
    reader.readAsText(file);
  };

  var resetTodo = function() {
    if (!confirm('BORRAR TODOS los datos? Esto no se puede deshacer.')) return;
    if (!confirm('Ultima oportunidad. Estas seguro?')) return;
    setState(defaultState);
    onShowToast('Datos borrados', 'warn');
  };

  var diasDesdeUltimoExport = state.ultimoExport
    ? Math.floor((new Date() - new Date(state.ultimoExport + 'T00:00:00')) / (1000 * 60 * 60 * 24))
    : null;

  return h('div', {className: 'px-5 pt-6 pb-28 screen-enter'},
    h('h1', {className: 'font-display text-4xl'}, 'Ajustes'),

    h('div', {className: 'mt-6'},
      h('div', {className: 'text-[10px] font-mono text-neutral-500 uppercase tracking-widest mb-3'}, 'Respaldo'),

      (diasDesdeUltimoExport === null || diasDesdeUltimoExport >= 7) && state.sesiones.length > 0 && h('div', {className: 'p-4 bg-yellow-900/20 border border-yellow-900/40 rounded-xl mb-3'},
        h('p', {className: 'text-xs'},
          (diasDesdeUltimoExport === null ? 'Aun no haces respaldo.' : ('Hace ' + diasDesdeUltimoExport + ' dias que no respaldas.')),
          ' Exporta y sube a OneDrive.'
        )
      ),

      h('button', {onClick: exportar, className: 'w-full p-4 bg-neutral-900 border border-neutral-800 rounded-xl text-left mb-2'},
        h('div', {className: 'font-semibold'}, 'Exportar JSON (backup completo)'),
        h('div', {className: 'text-xs text-neutral-500 mt-1'}, 'Para guardar en OneDrive y poder restaurar despues')
      ),

      h('button', {onClick: exportarCSV, className: 'w-full p-4 bg-neutral-900 border border-neutral-800 rounded-xl text-left mb-2'},
        h('div', {className: 'font-semibold'}, 'Exportar CSV (Excel)'),
        h('div', {className: 'text-xs text-neutral-500 mt-1'}, 'Para analisis en Excel/Power BI')
      ),

      h('button', {onClick: function() { if (fileInputRef.current) fileInputRef.current.click(); }, className: 'w-full p-4 bg-neutral-900 border border-neutral-800 rounded-xl text-left'},
        h('div', {className: 'font-semibold'}, 'Importar JSON'),
        h('div', {className: 'text-xs text-neutral-500 mt-1'}, 'Restaurar desde un backup')
      ),
      h('input', {ref: fileInputRef, type: 'file', accept: '.json', onChange: importar, className: 'hidden'})
    ),

    h('div', {className: 'mt-8'},
      h('div', {className: 'text-[10px] font-mono text-neutral-500 uppercase tracking-widest mb-3'}, 'Estadisticas'),
      h('div', {className: 'grid grid-cols-2 gap-2'},
        h('div', {className: 'p-4 bg-neutral-900/50 border border-neutral-800 rounded-xl'},
          h('div', {className: 'font-display text-3xl'}, state.sesiones.length),
          h('div', {className: 'text-xs text-neutral-500'}, 'sesiones')
        ),
        h('div', {className: 'p-4 bg-neutral-900/50 border border-neutral-800 rounded-xl'},
          h('div', {className: 'font-display text-3xl'}, state.mediciones.length),
          h('div', {className: 'text-xs text-neutral-500'}, 'mediciones')
        )
      )
    ),

    h('div', {className: 'mt-12'},
      h('button', {onClick: resetTodo, className: 'text-xs text-red-500 underline'},
        'Borrar todos los datos'
      )
    ),

    h('div', {className: 'mt-8 text-center'},
      h('div', {className: 'text-[10px] font-mono text-neutral-600'}, 'JJ STRONG v1.1 PWA'),
      h('div', {className: 'text-[10px] font-mono text-neutral-700 mt-1'}, 'Datos en tu navegador (localStorage) | Offline ready')
    )
  );
}

// ============================================================
// APP PRINCIPAL
// ============================================================
function App() {
  var _state = useState(loadState);
  var state = _state[0], setState = _state[1];
  var _tab = useState('home');
  var tab = _tab[0], setTab = _tab[1];
  var _toast = useState(null);
  var toast = _toast[0], setToast = _toast[1];

  useEffect(function() { saveState(state); }, [state]);

  var showToast = useCallback(function(message, type) {
    setToast({ message: message, type: type, id: Date.now() });
  }, []);

  var tabs = [
    { k: 'home', label: 'Hoy', icon: 'H' },
    { k: 'history', label: 'Historial', icon: 'R' },
    { k: 'progress', label: 'Progreso', icon: 'P' },
    { k: 'sup', label: 'Suplem.', icon: 'S' },
    { k: 'settings', label: 'Ajustes', icon: 'A' },
  ];

  return h('div', {className: 'min-h-screen bg-black text-neutral-100 safe-top'},
    h(InstallBanner),
    toast && h(Toast, {key: toast.id, message: toast.message, type: toast.type, onClose: function() { setToast(null); }}),

    h('main', {className: 'max-w-md mx-auto'},
      tab === 'home' && h(HomeScreen, {state: state, setState: setState, onShowToast: showToast}),
      tab === 'history' && h(HistoryScreen, {state: state}),
      tab === 'progress' && h(ProgressScreen, {state: state, setState: setState, onShowToast: showToast}),
      tab === 'sup' && h(SupplementsScreen, {state: state, setState: setState, onShowToast: showToast}),
      tab === 'settings' && h(SettingsScreen, {state: state, setState: setState, onShowToast: showToast})
    ),

    h('nav', {className: 'fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur border-t border-neutral-900 safe-bottom z-30'},
      h('div', {className: 'max-w-md mx-auto grid grid-cols-5'},
        tabs.map(function(t) {
          return h('button', {
            key: t.k,
            onClick: function() { setTab(t.k); },
            className: 'py-3 flex flex-col items-center gap-0.5 ' + (
              tab === t.k ? 'text-orange-500' : 'text-neutral-500'
            )
          },
            h('span', {className: 'text-lg font-display'}, t.icon),
            h('span', {className: 'text-[9px] font-mono uppercase tracking-widest'}, t.label)
          );
        })
      )
    )
  );
}

var root = ReactDOM.createRoot(document.getElementById('root'));
root.render(h(App));
</script>

<!DOCTYPE html>
<html>
<head><title>Generar Iconos JJ Strong</title></head>
<body style="background:#222;color:#fff;font-family:sans-serif;padding:40px;">
<h2>Generador de Iconos JJ Strong</h2>
<p>Haz clic en cada boton para descargar el icono. Luego pon los archivos en la misma carpeta que index.html.</p>
<canvas id="c192" width="192" height="192" style="border:1px solid #555;margin:10px;"></canvas>
<canvas id="c512" width="512" height="512" style="border:1px solid #555;margin:10px;"></canvas>
<br>
<button onclick="download('c192','icon-192.png')">Descargar icon-192.png</button>
<button onclick="download('c512','icon-512.png')">Descargar icon-512.png</button>

<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  // Background
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.2);
  ctx.fill();
  // Accent bar
  ctx.fillStyle = '#ff6b1a';
  ctx.fillRect(s * 0.1, s * 0.78, s * 0.8, s * 0.04);
  // Text
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `bold ${s * 0.28}px sans-serif`;
  ctx.fillText('JJ', s / 2, s * 0.35);
  ctx.font = `bold ${s * 0.14}px sans-serif`;
  ctx.fillStyle = '#ff6b1a';
  ctx.fillText('STRONG', s / 2, s * 0.6);
}
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

function download(id, name) {
  const canvas = document.getElementById(id);
  const link = document.createElement('a');
  link.download = name;
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
